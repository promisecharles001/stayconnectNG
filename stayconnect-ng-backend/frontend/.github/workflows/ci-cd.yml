name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: stayconnect-ng-backend/frontend/package-lock.json

      - name: Install dependencies
        working-directory: stayconnect-ng-backend/frontend
        run: npm ci --legacy-peer-deps

      - name: Run TypeScript check
        working-directory: stayconnect-ng-backend/frontend
        run: npx tsc --noEmit

      - name: Run unit tests
        working-directory: stayconnect-ng-backend/frontend
        run: npm run test:ci

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: stayconnect-ng-backend/frontend/coverage/lcov.info
          fail_ci_if_error: false

  build-android:
    name: Build Android (Preview)
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: stayconnect-ng-backend/frontend/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: stayconnect-ng-backend/frontend
        run: npm ci --legacy-peer-deps

      - name: Build Android Preview
        working-directory: stayconnect-ng-backend/frontend
        run: eas build --profile preview --platform android --non-interactive

  build-ios:
    name: Build iOS (Preview)
    needs: test
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: stayconnect-ng-backend/frontend/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: stayconnect-ng-backend/frontend
        run: npm ci --legacy-peer-deps

      - name: Build iOS Preview
        working-directory: stayconnect-ng-backend/frontend
        run: eas build --profile preview --platform ios --non-interactive
